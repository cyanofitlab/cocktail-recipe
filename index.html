.method { color: #ffd36a; font-weight: 700; }

.point {

  border-radius: 10px;

  border: 1px solid #383838;
  font-size: 13px;
  line-height: 1.6;
}

.point strong {

}

details.point {
  cursor: pointer;
}

details.point summary {
  list-style: none;
  font-weight: 700;
  color: #ffd36a;
}

details.point summary::-webkit-details-marker {

}

.point-body {

}
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tags span { padding: 5px 9px; border-radius: 999px; background: #262626; border: 1px solid #444; font-size: 12px; color: #ddd; }
.empty { color: #aaa; text-align: center; padding: 40px 0; }
</style>

const categories = ["すべて", ...Array.from(new Set(cocktails.map(item => item.category)))];
let activeCategory = "すべて";

const tabs = document.getElementById("tabs");
const list = document.getElementById("list");
const searchInput = document.getElementById("searchInput");

function renderTabs() {
  tabs.innerHTML = "";
  categories.forEach(category => {
    const button = document.createElement("button");
    button.className = "tab" + (category === activeCategory ? " active" : "");
    const count = category === "すべて"
      ? cocktails.length
      : cocktails.filter(item => item.category === category).length;
    button.textContent = `${category} ${count}`;
    button.onclick = () => {
      activeCategory = category;
      renderTabs();
      renderList();
    };
    tabs.appendChild(button);
  });
}

function getIce(item) {
  const glass = String(item.glass || "");
  const method = String(item.method || "");
  const name = String(item.name || "");
  const ingredients = (item.ingredients || []).join(" ");

  if (glass.includes("カクテルグラス")) return "なし / グラス冷却";
  if (name.includes("マティーニ") || name.includes("マンハッタン")) return "なし / グラス冷却";
  if (glass.includes("オールドファッションド")) return "ロックアイス";
  if (method.includes("シェイク") && !glass.includes("カクテルグラス")) return "シェイク時のみ / 提供時は氷あり";
  if (ingredients.includes("ソーダ") || ingredients.includes("トニック") || ingredients.includes("ジンジャーエール") || ingredients.includes("コーラ")) return "ロックアイス";
  return "ロックアイス";
}

    "マタドール": "パイナップルをしっかり冷やす。泡立ちすぎに注意。",
    "マルガリータ": "先にスノースタイル。しっかりシェイクして冷やす。",

    "ラムトニック": "トニックは最後。ラムの甘い香りを残す。",
    "ソルクバーノ": "グレープフルーツとトニックで軽やかに。混ぜすぎない。",
    "XYZ": "レモンとコアントローのバランスが重要。しっかり冷やす。",
    "ボストンクーラー": "ジンジャーエールは最後。シェイク後に炭酸を加える。",
    "ダイキリ": "ライムとシロップのバランスが重要。しっかり冷やす。",
    "ラムクーラー": "ソーダは最後。グレナデンを入れすぎない。",

    "ゴッドファーザー": "アマレットの甘さが強いので、軽くなじませる程度。",
    "マンハッタン": "グラスは冷やす。ステアは静かに。ビターズは1dash。"
  };

  if (points[name]) return points[name];
  if (method === "シェイク") return "しっかり冷やす。提供前にグラスを整える。";
  if (ingredients.includes("ソーダ") || ingredients.includes("トニック") || ingredients.includes("ジンジャーエール") || ingredients.includes("コーラ")) {
    return "炭酸は最後。混ぜすぎない。";
  }
  return "材料を入れ忘れないよう確認して、軽くなじませる。";
}

function getBuildOrder(item) {
  const method = item.method;
  const ingredients = (item.ingredients || []).join(" ");

  if (method === "シェイク") return "氷 → 材料 → シェイク → グラスへ";
  if (method === "ステア") return "氷 → 材料 → 静かにステア → グラスへ";
  if (ingredients.includes("ソーダ") || ingredients.includes("トニック") || ingredients.includes("ジンジャーエール") || ingredients.includes("コーラ") || ingredients.includes("ビール")) {
    return "氷 → ベース → 副材料 → 炭酸 → 軽くステア";
  }
  return "氷 → 材料 → 軽くステア";
}

function getGlassIcon(glass) {
  const g = String(glass || "");

  if (g.includes("カクテル")) {
    return `
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M14 10h36L32 32 14 10z"></path>
        <line x1="32" y1="32" x2="32" y2="52"></line>
        <line x1="22" y1="56" x2="42" y2="56"></line>
      </svg>
    `;
  }

  if (g.includes("オールドファッションド")) {
    return `
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M18 18h28l-4 34H22L18 18z"></path>
        <line x1="21" y1="28" x2="43" y2="28"></line>
        <line x1="23" y1="52" x2="41" y2="52"></line>
      </svg>
    `;
  }

  if (g.includes("マグ")) {
    return `
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <rect x="16" y="14" width="28" height="40" rx="4"></rect>
        <path d="M44 24h6c5 0 7 4 7 9s-2 9-7 9h-6"></path>
      </svg>
    `;
  }

  return `
    <svg viewBox="0 0 64 64" aria-hidden="true">
      <path d="M18 10h28l-4 44H22L18 10z"></path>
      <line x1="20" y1="24" x2="44" y2="24"></line>
      <line x1="23" y1="54" x2="41" y2="54"></line>
    </svg>
  `;
}

function cleanIngredients(item) {
  const garnish = String(item.garnish || "").trim();
  if (!garnish || garnish === "-") return item.ingredients || [];

  return (item.ingredients || []).filter(ingredient => {
    const text = String(ingredient);
    if (garnish.includes("/") && garnish.split("/").some(g => text.includes(g.trim()))) return false;
    if (garnish.includes("ライム") && text.includes("カットライム")) return false;
    if (garnish.includes("レモン") && text.includes("カットレモン")) return false;
    if (garnish.includes("塩") && text.includes("塩")) return false;
    if (garnish.includes("ピール") && text.includes("ピール")) return false;
    if (garnish.includes("チェリー") && text.includes("チェリー")) return false;
    return true;
  });
}

function renderList() {
  const keyword = searchInput.value.trim().toLowerCase();

  const filtered = cocktails.filter(item => {
    const categoryMatch = activeCategory === "すべて" || item.category === activeCategory;
    const searchText = [
      item.name, item.category, item.base, item.price, item.method, item.glass, item.garnish,
      getIce(item), getBuildOrder(item), getPoint(item),
      ...(item.ingredients || []), ...(item.taste || []), ...(item.scene || [])
    ].join(" ").toLowerCase();
    return categoryMatch && searchText.includes(keyword);
  });

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当するレシピがありません</div>';
    return;
  }

  filtered.forEach(item => {
    const card = document.createElement("section");
    card.className = "card";
    const displayIngredients = cleanIngredients(item);

    card.innerHTML = `
      <h2>${item.name}</h2>
      <div class="meta">
        <span class="badge">${item.category}</span>
        <span class="badge">${item.price}</span>
      </div>
      <div class="ingredients">${displayIngredients.join(" / ")}</div>
      <div class="info">
        <div><strong>作り方</strong>：<span class="method">${item.method}</span></div>
        <div class="glass-row">
          <span class="glass-icon">${getGlassIcon(item.glass)}</span>
          <span><strong>グラス</strong>：${item.glass}</span>
        </div>
        <div><strong>氷</strong>：${getIce(item)}</div>
        <div><strong>順番</strong>：${getBuildOrder(item)}</div>
        <div><strong>ガーニッシュ</strong>：${item.garnish}</div>
        <details class="point">
          <summary>POINT</summary>
          <div class="point-body">${getPoint(item)}</div>
        </details>
      </div>
      <div class="tags">
        ${(item.taste || []).map(t => `<span>${t}</span>`).join("")}
        ${(item.scene || []).map(s => `<span>${s}</span>`).join("")}
      </div>
    `;
    list.appendChild(card);
  });
}

searchInput.addEventListener("input", renderList);
renderTabs();
renderList();
</script>
</body>
</html>
